---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | date_to_xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%Y-%m-%d" }}
      </time>
    </p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

  <nav style="display: flex; justify-content: space-between; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #e8e8e8; font-size: 0.85em;">
    {% if page.previous.url %}
      <a href="{{ page.previous.url | prepend: site.baseurl }}">← {{ page.previous.title }}</a>
    {% else %}
      <span></span>
    {% endif %}
    {% if page.next.url %}
      <a href="{{ page.next.url | prepend: site.baseurl }}" style="text-align: right;">{{ page.next.title }} →</a>
    {% else %}
      <span></span>
    {% endif %}
  </nav>

</article>
